name: Build and Deploy LastFM Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: ["master"]
    paths:
      - "build_lastfm_dashboard.py"
      - "sync_lastfm_api.py"
      - "recenttracks-*.json"
      - "lastfmstats-*.json"
      - "template.html"
      - ".github/workflows/deploy-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      LASTFM_USER: TOOUUR
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Last.fm sync cache
        id: lastfm_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            raw_snapshot/api_scrobbles_cache.json
            raw_snapshot/api_aggregates.json
            raw_snapshot/all_scrobbles_api.json
            raw_snapshot/scrobbles_diff.json
          key: lastfm-sync-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            lastfm-sync-${{ runner.os }}-${{ github.ref_name }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Validate required secrets
        run: |
          if [ -z "$LASTFM_API_KEY" ]; then
            echo "LASTFM_API_KEY is missing. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Sync Last.fm API cache (incremental)
        run: |
          python sync_lastfm_api.py \
            --user "$LASTFM_USER" \
            --cache raw_snapshot/api_scrobbles_cache.json \
            --aggregates raw_snapshot/api_aggregates.json \
            --full-export raw_snapshot/all_scrobbles_api.json \
            --seed-export raw_snapshot/all_scrobbles_api.json \
            --lookback-hours 72 \
            --delay-ms 120

      - name: Save Last.fm sync cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            raw_snapshot/api_scrobbles_cache.json
            raw_snapshot/api_aggregates.json
            raw_snapshot/all_scrobbles_api.json
            raw_snapshot/scrobbles_diff.json
          key: lastfm-sync-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}

      - name: Build dashboard
        run: |
          mkdir -p site
          python build_lastfm_dashboard.py \
            --user "$LASTFM_USER" \
            --output site/index.html \
            --json-output site/lastfm_data.json \
            --api-aggregates raw_snapshot/api_aggregates.json \
            --skip-album-track-fetch

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
